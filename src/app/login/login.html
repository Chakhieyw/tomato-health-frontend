<div class="login-page">
  <div class="leaf leaf-1"></div>
  <div class="leaf leaf-2"></div>

  <div class="login-card">
    <!-- HEADER -->
    <div class="login-header">
      <div class="logo">
        <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#a16207" />
              <stop offset="100%" stop-color="#713f12" />
            </linearGradient>
          </defs>
          <rect x="16" y="60" width="48" height="12" rx="6" fill="url(#soil)" />
          <path
            d="M40 60 Q40 48 40 36"
            stroke="#15803d"
            stroke-width="3.5"
            stroke-linecap="round"
            fill="none"
          />
          <path
            d="M40 44 C38 36 28 30 22 34 C18 38 22 46 32 46 Z"
            fill="#22c55e"
          />
          <path
            d="M40 44 C36 40 30 38 26 40"
            stroke="#15803d"
            stroke-width="1.3"
            fill="none"
            stroke-linecap="round"
          />
          <path
            d="M40 38 C42 30 52 24 58 28 C62 32 58 40 48 40 Z"
            fill="#4ade80"
          />
          <path
            d="M40 38 C44 34 50 32 54 34"
            stroke="#15803d"
            stroke-width="1.3"
            fill="none"
            stroke-linecap="round"
          />
          <path
            d="M40 36 C36 26 28 22 26 28 C24 34 32 38 40 36Z"
            fill="#16a34a"
          />
          <path
            d="M40 36 C44 26 52 22 54 28 C56 34 48 38 40 36Z"
            fill="#16a34a"
          />
          <circle cx="40" cy="34" r="3" fill="#4ade80" />
        </svg>
      </div>
      <h2>Tomato Health</h2>
      <p>เข้าสู่ระบบเพื่อดูข้อมูลการตรวจ</p>
    </div>

    <!-- FORM -->
    <form (ngSubmit)="login()" class="login-form" autocomplete="off">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <mat-icon matPrefix>person_outline</mat-icon>
        <input
          matInput
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="กรอกชื่อผู้ใช้"
          autocomplete="off"
          required
        />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <mat-icon matPrefix>lock_outline</mat-icon>
        <input
          matInput
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          placeholder="กรอกรหัสผ่าน"
          autocomplete="new-password"
          required
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="showPassword = !showPassword"
        >
          <mat-icon
            >{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon
          >
        </button>
      </mat-form-field>

      <!-- ERROR -->
      <div class="error-box" *ngIf="error">
        <mat-icon>error_outline</mat-icon>
        <span>{{ error }}</span>
      </div>

      <button
        mat-flat-button
        class="login-btn"
        type="submit"
        [disabled]="loading"
      >
        <mat-spinner
          *ngIf="loading"
          diameter="18"
          class="btn-spinner"
        ></mat-spinner>
        <mat-icon *ngIf="!loading">login</mat-icon>
        {{ loading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ' }}
      </button>
    </form>
  </div>
</div>
